# common-repo configuration
# Generated by interactive wizard

# Local consumption — apply upstream template to this repo
- self:
    - repo:
        url: https://github.com/common-repo/upstream
        ref: v2.0.5
        with:
        - template-vars:
            GH_APP_ID_SECRET: COMMON_REPO_BOT_CLIENT_ID
            GH_APP_KEY_SECRET: COMMON_REPO_BOT_PRIVATE_KEY
            GH_APP_OWNER: common-repo

# Source API — what consumers inherit
- include: ["src/**"]
- rename:
    - "^src/(.*)$": "$1"
- yaml:
    auto-merge: .pre-commit-config.yaml
    defer: true # only auto-merge when used as an upstream
